{{ if .Store.Get "hasMermaid" }}
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: 'base',
    themeVariables: {
      background: '#000000',
      primaryColor: '#2a2a2a',
      primaryTextColor: '#ffffff',
      primaryBorderColor: '#888888',
      lineColor: '#00d4ff',
      secondaryColor: '#1a1a1a',
      tertiaryColor: '#1a1a1a',
      edgeLabelBackground: '#000000',
      clusterBkg: '#1a1a1a',
      clusterBorder: '#888888',
      titleColor: '#ffd700',
      nodeTextColor: '#ffffff',
    }
  });

  function initPanZoom() {
    document.querySelectorAll('.mermaid svg').forEach(function (svg) {
      if (svg.dataset.panZoom) return;
      svg.dataset.panZoom = 'true';
      svg.style.width = '100%';
      svg.style.height = '100%';
      svgPanZoom(svg, {
        zoomEnabled: true,
        controlIconsEnabled: true,
        fit: true,
        center: true,
        minZoom: 0.3,
        maxZoom: 10,
      });
    });
  }

  // Use MutationObserver to detect when Mermaid inserts the SVG
  document.addEventListener('DOMContentLoaded', function () {
    var observer = new MutationObserver(function (mutations) {
      mutations.forEach(function (mutation) {
        mutation.addedNodes.forEach(function (node) {
          if (node.nodeName === 'svg') initPanZoom();
        });
      });
    });
    document.querySelectorAll('.mermaid').forEach(function (el) {
      observer.observe(el, { childList: true });
    });
  });
</script>
<style>
  .mermaid {
    border: 1px solid #444;
    border-radius: 8px;
    padding: 1.5rem;
    overflow: hidden;
    height: 520px;
    cursor: grab;
  }
  .mermaid:active {
    cursor: grabbing;
  }
  .mermaid svg {
    width: 100%;
    height: 100%;
  }
  .mermaid .flowchart-link {
    stroke-width: 2.5px !important;
  }
  .mermaid marker path {
    stroke-width: 2px !important;
  }
  .mermaid .cluster-label span,
  .mermaid .cluster-label p {
    color: #ffd700 !important;
    font-weight: 700 !important;
    display: block;
    margin-bottom: 8px;
  }
  /* svg-pan-zoom control icons */
  .mermaid svg [id="svg-pan-zoom-controls"] {
    transform: scale(0.6);
    transform-origin: right bottom;
    transform-box: fill-box;
  }
  .mermaid svg [id="svg-pan-zoom-controls"] rect {
    fill: transparent !important;
    stroke: none !important;
  }
  .mermaid svg [id="svg-pan-zoom-controls"] path,
  .mermaid svg [id="svg-pan-zoom-controls"] polygon {
    fill: #555 !important;
    transition: fill 0.15s;
  }
  .mermaid svg [id="svg-pan-zoom-controls"] g:hover path,
  .mermaid svg [id="svg-pan-zoom-controls"] g:hover polygon {
    fill: #00d4ff !important;
  }
</style>
{{ end }}
