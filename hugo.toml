    name = "ADRs"
    url = "/adr/"
    weight = 20
  [[menu.main]]
    identifier = "onboarding"
    name = "Onboarding"
    url = "/onboarding/"
    weight = 30
  [[menu.main]]
    identifier = "postmortems"
    name = "Postmortems"
    url = "/postmortems/"
    weight = 40
  [[menu.main]]
    identifier = "standards"
