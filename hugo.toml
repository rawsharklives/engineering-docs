baseURL = "https://rawsharklives.github.io/engineering-docs/"
languageCode = "en-gb"
title = "Engineering Docs"
theme = "PaperMod"
paginate = 20

[params]
  description = "Canonical engineering knowledge base"
  author = "Platform Engineering"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  disableSpecial1stPost = true
  displayFullLangName = true
  defaultTheme = "auto"

[params.homeInfoParams]
  Title = "Engineering Docs"
  Content = "Canonical source of truth for runbooks, ADRs, onboarding guides, and postmortems."

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/rawsharklives/engineering-docs"

[menu]
  [[menu.main]]
